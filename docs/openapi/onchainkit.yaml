openapi: 3.0.0

info:
  title: OnchainKit API
  version: "1.0.0"
  description: API reference for OnchainKit functionality

components:
  parameters:
    ContractAddressParam:
      name: contractAddress
      in: query
      required: true
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
      description: The NFT contract address

    TakerAddressParam:
      name: takerAddress
      in: query
      required: true
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
      description: The address of the NFT recipient

    TokenIdParam:
      name: tokenId
      in: query
      required: true
      schema:
        type: string
      description: The token ID of the NFT

    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100

    SearchParam:
      name: search
      in: query
      required: false
      schema:
        type: string

  schemas:
    Price:
      type: object
      properties:
        amount:
          type: string
        currency:
          type: string
        amountUSD:
          type: string

    Token:
      type: object
      required:
        - name
        - address
        - symbol
        - decimals
        - imageUrl
        - chainId
      properties:
        name:
          type: string
        address:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
        symbol:
          type: string
        decimals:
          type: integer
        imageUrl:
          type: string
          format: uri
        chainId:
          type: integer

    GetTokenDetailsResponse:
      type: object
      required:
        - name
        - imageUrl
        - ownerAddress
      properties:
        collectionName:
          type: string
        collectionDescription:
          type: string
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        animationUrl:
          type: string
          format: uri
        ownerAddress:
          type: string
        lastSoldPrice:
          $ref: "#/components/schemas/Price"
        mimeType:
          type: string
        contractType:
          type: string

    GetMintDetailsResponse:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        animationUrl:
          type: string
          format: uri
        mimeType:
          type: string
        contractType:
          type: string
        price:
          $ref: "#/components/schemas/Price"
        mintFee:
          $ref: "#/components/schemas/Price"
        maxMintsPerWallet:
          type: integer
        isEligibleToMint:
          type: boolean
        creatorAddress:
          type: string
        network:
          type: string
          enum:
            - base-mainnet
            - base-sepolia
        totalTokens:
          type: string
        totalOwners:
          type: string

    BuildMintTransactionParams:
      type: object
      required:
        - mintAddress
        - takerAddress
        - tokenId
        - quantity
        - network
      properties:
        mintAddress:
          type: string
        takerAddress:
          type: string
        tokenId:
          type: string
        quantity:
          type: integer
        network:
          type: string

    BuildMintTransactionResponse:
      type: object
      properties:
        callData:
          type: object
          properties:
            from:
              type: string
            to:
              type: string
            data:
              type: string
            value:
              type: string
              description: Amount in wei

paths:
  /get-token-details:
    get:
      summary: Get token details
      parameters:
        - $ref: "#/components/parameters/ContractAddressParam"
        - $ref: "#/components/parameters/TokenIdParam"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTokenDetailsResponse"

  /get-mint-details:
    get:
      summary: Get mint details
      parameters:
        - $ref: "#/components/parameters/ContractAddressParam"
        - $ref: "#/components/parameters/TakerAddressParam"
        - $ref: "#/components/parameters/TokenIdParam"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMintDetailsResponse"

  /build-mint-transaction:
    post:
      summary: Build mint transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildMintTransactionParams"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildMintTransactionResponse"

  /get-tokens:
    get:
      summary: Get tokens
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Token"
