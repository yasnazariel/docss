openapi: 3.0.0
info:
  title: OnchainKit API
  version: "1.0.0"
  description: API reference for OnchainKit functionality

components:
  parameters:
    ContractAddressParam:
      name: contractAddress
      in: query
      required: true
      schema:
        type: string
      description: The NFT contract address
      example: "0x123..."
    TakerAddressParam:
      name: takerAddress
      in: query
      required: true
      schema:
        type: string
      description: The address of the NFT recipient
    TokenIdParam:
      name: tokenId
      in: query
      required: true
      schema:
        type: string
      description: The token ID of the NFT
      example: "1"
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: string
      description: Maximum number of tokens to return
    SearchParam:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: Substring to filter token names or symbols

  schemas:
    Token:
      type: object
      required: [name, address, symbol, decimals, image, chainId]
      properties:
        name:
          type: string
        address:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        image:
          type: string
          format: uri
        chainId:
          type: integer

    GetTokenDetailsResponse:
      type: object
      properties:
        collectionName: { type: string }
        collectionDescription: { type: string }
        name: { type: string }
        description: { type: string }
        imageUrl:
          type: string
          format: uri
        animationUrl:
          type: string
          format: uri
        ownerAddress: { type: string }
        lastSoldPrice:
          type: object
          properties:
            amount: { type: string }
            currency: { type: string }
            amountUSD: { type: string }
        mimeType: { type: string }
        contractType: { type: string }

    GetMintDetailsResponse:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        imageUrl:
          type: string
          format: uri
        animationUrl:
          type: string
          format: uri
        mimeType: { type: string }
        contractType: { type: string }
        price:
          type: object
          properties:
            amount: { type: string }
            currency: { type: string }
            amountUSD: { type: string }
        mintFee:
          type: object
          properties:
            amount: { type: string }
            currency: { type: string }
            amountUSD: { type: string }
        maxMintsPerWallet:
          type: integer
        isEligibleToMint:
          type: boolean
        creatorAddress:
          type: string
        network:
          type: string
        totalTokens:
          type: string
        totalOwners:
          type: string

    BuildMintTransactionParams:
      type: object
      required: [mintAddress, takerAddress, tokenId, quantity, network]
      properties:
        mintAddress: { type: string }
        takerAddress: { type: string }
        tokenId: { type: string }
        quantity: { type: integer }
        network: { type: string }

    BuildMintTransactionResponse:
      type: object
      properties:
        call_data:
          type: object
          properties:
            from: { type: string }
            to: { type: string }
            data: { type: string }
            value: { type: string }

    GetSwapQuoteResponse:
      type: object
      properties:
        amountReference: { type: string }
        chainId: { type: integer }
        from:
          $ref: "#/components/schemas/Token"
        to:
          $ref: "#/components/schemas/Token"
        fromAmount: { type: string }
        toAmount: { type: string }
        priceImpact: { type: string }
        highPriceImpact: { type: boolean }
        slippage: { type: string }

    GetPortfoliosResponse:
      type: object
      properties:
        portfolios:
          type: array
          items:
            type: object
            properties:
              address: { type: string }
              portfolioBalanceInUsd: { type: number }

paths:
  /getTokenDetails:
    get:
      summary: GetTokenDetails
      operationId: get-token-details
      tags: [Mint]
      parameters:
        - $ref: "#/components/parameters/ContractAddressParam"
        - $ref: "#/components/parameters/TokenIdParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTokenDetailsResponse"

  /getMintDetails:
    get:
      summary: GetMintDetails
      operationId: get-mint-details
      tags: [Mint]
      parameters:
        - $ref: "#/components/parameters/ContractAddressParam"
        - $ref: "#/components/parameters/TakerAddressParam"
        - $ref: "#/components/parameters/TokenIdParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMintDetailsResponse"

  /buildMintTransaction:
    post:
      summary: BuildMintTransaction
      operationId: build-mint-transaction
      tags: [Mint]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildMintTransactionParams"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildMintTransactionResponse"

  /getSwapQuote:
    get:
      summary: GetSwapQuote
      operationId: get-swap-quote
      tags: [Swap]
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
        - name: to
          in: query
          required: true
          schema:
            type: string
        - name: amount
          in: query
          required: true
          schema:
            type: string
        - name: useAggregator
          in: query
          required: true
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSwapQuoteResponse"

  /getTokens:
    get:
      summary: GetTokens
      operationId: get-tokens
      tags: [Token]
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
      responses:
        "200":
          description: Success

  /getPortfolios:
    get:
      summary: GetPortfolios
      operationId: get-portfolios
      tags: [Wallet]
      parameters:
        - name: addresses
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPortfoliosResponse"
